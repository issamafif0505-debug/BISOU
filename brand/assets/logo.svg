<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 500 180"
     width="500" height="180"
     role="img"
     aria-label="ÔRIYA — L'or qui t'embrasse">

  <defs>

    <!-- ═══════════════════════════════════ -->
    <!-- GRADIENTS                           -->
    <!-- ═══════════════════════════════════ -->

    <!-- Primary 5-stop metallic gold sheen: top-to-bottom -->
    <linearGradient id="goldSheen" x1="0" y1="0" x2="0" y2="1"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="22%"  stop-color="#D4AF37"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="78%"  stop-color="#A8862E"/>
      <stop offset="100%" stop-color="#7A5C0E"/>
    </linearGradient>

    <!-- Horizontal gold reflect: angled sheen left-to-right -->
    <linearGradient id="goldReflect" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7A5C0E"/>
      <stop offset="18%"  stop-color="#A8862E"/>
      <stop offset="45%"  stop-color="#D4AF37"/>
      <stop offset="65%"  stop-color="#F5E6A3"/>
      <stop offset="82%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8862E"/>
    </linearGradient>

    <!-- Diagonal sweep gold for wordmark — primary sheen -->
    <linearGradient id="goldSweep" x1="0" y1="0" x2="1" y2="1"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="28%"  stop-color="#D4AF37"/>
      <stop offset="52%"  stop-color="#C9A84C"/>
      <stop offset="76%"  stop-color="#A8862E"/>
      <stop offset="100%" stop-color="#7A5C0E"/>
    </linearGradient>

    <!-- Radial gold highlight — center burst for wordmark -->
    <radialGradient id="goldRadial" cx="50%" cy="40%" r="55%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="35%"  stop-color="#D4AF37"/>
      <stop offset="70%"  stop-color="#A8862E"/>
      <stop offset="100%" stop-color="#7A5C0E"/>
    </radialGradient>

    <!-- Shimmer overlay radial — translucent highlight sweep on wordmark -->
    <radialGradient id="goldShimmer" cx="28%" cy="22%" r="62%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFBE8" stop-opacity="0.60"/>
      <stop offset="40%"  stop-color="#F5E6A3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4AF37"  stop-opacity="0"/>
    </radialGradient>

    <!-- Horizontal rule gradient — fade to transparent at both ends -->
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="12%"  stop-color="#D4AF37" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#F5E6A3" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#D4AF37" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>

    <!-- Tagline gradient — horizontal gold sweep -->
    <linearGradient id="taglineGrad" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#A8862E"/>
      <stop offset="35%"  stop-color="#D4AF37"/>
      <stop offset="58%"  stop-color="#F5E6A3"/>
      <stop offset="80%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8862E"/>
    </linearGradient>

    <!-- Background radial glow — warm gold behind composition -->
    <radialGradient id="bgGlow" cx="50%" cy="52%" r="50%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2C1E00" stop-opacity="0.70"/>
      <stop offset="55%"  stop-color="#1A1200" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0D0D0D"  stop-opacity="0"/>
    </radialGradient>

    <!-- Gem crown gradient -->
    <linearGradient id="gemCrown" x1="0" y1="0" x2="0" y2="1"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="38%"  stop-color="#D4AF37"/>
      <stop offset="72%"  stop-color="#A8862E"/>
      <stop offset="100%" stop-color="#7A5C0E"/>
    </linearGradient>

    <!-- Gem facet highlight — translucent sweep -->
    <linearGradient id="gemFacetLight" x1="0" y1="0" x2="1" y2="1"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFBE8" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#D4AF37"  stop-opacity="0.25"/>
    </linearGradient>

    <!-- Corner ornament radial -->
    <radialGradient id="dotGrad" cx="50%" cy="30%" r="60%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5E6A3"/>
      <stop offset="55%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#7A5C0E"/>
    </radialGradient>

    <!-- ═══════════════════════════════════ -->
    <!-- FILTERS                             -->
    <!-- ═══════════════════════════════════ -->

    <!-- Soft glow filter applied to wordmark — feGaussianBlur + feMerge -->
    <filter id="glowFilter" x="-18%" y="-45%" width="136%" height="190%"
            color-interpolation-filters="sRGB">
      <!-- Wide soft halo -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blurWide"/>
      <!-- Tight crisp halo -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blurTight"/>
      <!-- Tint wide halo warm gold -->
      <feColorMatrix in="blurWide" type="matrix"
        values="1.1 0.7 0   0 0.08
                0.8 0.6 0   0 0.03
                0   0   0   0 0
                0   0   0   0.9 0" result="haloWarm"/>
      <!-- Tint tight halo bright gold -->
      <feColorMatrix in="blurTight" type="matrix"
        values="1.5 1.1 0.2 0 0.05
                1.0 0.8 0.1 0 0.02
                0   0   0   0 0
                0   0   0   0.7 0" result="haloBright"/>
      <feMerge>
        <feMergeNode in="haloWarm"/>
        <feMergeNode in="haloBright"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Motif gem glow -->
    <filter id="motifGlow" x="-35%" y="-35%" width="170%" height="170%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1.4 1.0 0.1 0 0.1
                0.9 0.7 0   0 0.03
                0   0   0   0 0
                0   0   0   0.65 0" result="tinted"/>
      <feMerge>
        <feMergeNode in="tinted"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tagline soft glow -->
    <filter id="taglineGlow" x="-4%" y="-50%" width="108%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BACKGROUND                                     -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Solid dark background -->
  <rect width="500" height="180" fill="#0D0D0D"/>

  <!-- Radial warm glow behind composition -->
  <ellipse cx="250" cy="90" rx="230" ry="82" fill="url(#bgGlow)"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- MICRO CORNER ORNAMENTS — diamond dots          -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Top-left -->
  <polygon points="18,10 21,14 18,18 15,14"
           fill="url(#dotGrad)" opacity="0.88"/>
  <!-- Top-right -->
  <polygon points="482,10 485,14 482,18 479,14"
           fill="url(#dotGrad)" opacity="0.88"/>
  <!-- Bottom-left -->
  <polygon points="18,162 21,166 18,170 15,166"
           fill="url(#dotGrad)" opacity="0.88"/>
  <!-- Bottom-right -->
  <polygon points="482,162 485,166 482,170 479,166"
           fill="url(#dotGrad)" opacity="0.88"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- TOP HORIZONTAL RULE — 0.6px, fade ends        -->
  <!-- ══════════════════════════════════════════════ -->

  <line x1="28" y1="28" x2="472" y2="28"
        stroke="url(#ruleGrad)" stroke-width="0.6" opacity="0.92"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- JEWELRY MOTIF — Faceted diamond gem            -->
  <!-- Pure SVG cubic bezier brilliant-cut profile    -->
  <!-- Positioned left of the B, vertically centered  -->
  <!-- ══════════════════════════════════════════════ -->

  <g transform="translate(50, 88)" filter="url(#motifGlow)">

    <!-- === CROWN (top half of gem) === -->

    <!-- Main crown body — table + upper girdle facets -->
    <path d="M 0,-24
             C 2,-24 5,-20 8,-15
             L 14,-8
             C 16,-5 14,-2 12,0
             L -12,0
             C -14,-2 -16,-5 -14,-8
             L -8,-15
             C -5,-20 -2,-24 0,-24
             Z"
          fill="url(#gemCrown)"/>

    <!-- Left crown facet — shadow side -->
    <path d="M 0,-24 L -8,-15 L -12,0 L -6,-10 Z"
          fill="#5C3D0A" opacity="0.55"/>

    <!-- Right crown facet — highlight side -->
    <path d="M 0,-24 L 8,-15 L 12,0 L 6,-10 Z"
          fill="url(#gemFacetLight)" opacity="0.50"/>

    <!-- Table facet (top flat surface — brightest spot) -->
    <path d="M 0,-16 L 7,-10 L 0,-6 L -7,-10 Z"
          fill="url(#gemFacetLight)" opacity="0.85"/>

    <!-- Star facets between table and crown -->
    <path d="M 0,-16 L -7,-10 L -4,-14 Z"  fill="#FFFBE8" opacity="0.45"/>
    <path d="M 0,-16 L 7,-10  L 4,-14 Z"   fill="#FFFBE8" opacity="0.30"/>

    <!-- === GIRDLE line (waist) === -->
    <line x1="-13" y1="-1" x2="13" y2="-1"
          stroke="#D4AF37" stroke-width="0.55" opacity="0.75"/>

    <!-- === PAVILION (bottom half of gem) === -->

    <!-- Pavilion main body -->
    <path d="M -12,0
             L 12,0
             C 10,4 6,10 3,15
             L 0,24
             L -3,15
             C -6,10 -10,4 -12,0
             Z"
          fill="url(#gemCrown)" opacity="0.92"/>

    <!-- Pavilion left facet shadow -->
    <path d="M -12,0 L -3,15 L 0,24 L 0,8 Z"
          fill="#3E2505" opacity="0.50"/>

    <!-- Pavilion right highlight -->
    <path d="M 12,0 L 3,15 L 0,24 L 0,8 Z"
          fill="url(#gemFacetLight)" opacity="0.30"/>

    <!-- === SPARKLE at crown tip === -->
    <circle cx="0" cy="-24" r="1.4" fill="#FFFBE8" opacity="0.95"/>
    <!-- Vertical sparkle ray -->
    <line x1="0" y1="-30" x2="0" y2="-18"
          stroke="#F5E6A3" stroke-width="0.5" opacity="0.75"/>
    <!-- Horizontal sparkle ray -->
    <line x1="-6" y1="-24" x2="6" y2="-24"
          stroke="#F5E6A3" stroke-width="0.5" opacity="0.75"/>
    <!-- Diagonal sparkle rays -->
    <line x1="-4" y1="-28" x2="4" y2="-20"
          stroke="#F5E6A3" stroke-width="0.3" opacity="0.45"/>
    <line x1="4" y1="-28" x2="-4" y2="-20"
          stroke="#F5E6A3" stroke-width="0.3" opacity="0.45"/>

    <!-- Small sparkle at pavilion tip -->
    <circle cx="0" cy="24" r="0.8" fill="#D4AF37" opacity="0.7"/>

  </g>

  <!-- ══════════════════════════════════════════════ -->
  <!-- WORDMARK: ÔRIYA                                -->
  <!-- Serif letterforms, wide-tracked, gold gradient -->
  <!-- Glow layer beneath, shimmer layer on top       -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Glow layer — blurred and warm-tinted behind letterforms -->
  <g filter="url(#glowFilter)" opacity="0.60">
    <text
      x="268" y="108"
      text-anchor="middle"
      font-family="'Times New Roman', 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif"
      font-size="70"
      font-weight="400"
      letter-spacing="16"
      fill="url(#goldSheen)">ÔRIYA</text>
  </g>

  <!-- Main wordmark — diagonal gold sweep fill -->
  <text
    x="268" y="108"
    text-anchor="middle"
    font-family="'Times New Roman', 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="70"
    font-weight="400"
    letter-spacing="16"
    fill="url(#goldSweep)">ÔRIYA</text>

  <!-- Shimmer overlay — radial highlight on letterforms -->
  <text
    x="268" y="108"
    text-anchor="middle"
    font-family="'Times New Roman', 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="70"
    font-weight="400"
    letter-spacing="16"
    fill="url(#goldShimmer)"
    opacity="0.80">ÔRIYA</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BOTTOM RULE — below wordmark, above tagline    -->
  <!-- ══════════════════════════════════════════════ -->

  <line x1="28" y1="126" x2="472" y2="126"
        stroke="url(#ruleGrad)" stroke-width="0.6" opacity="0.90"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- TAGLINE ORNAMENT DIAMONDS                      -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Left side diamond ornament -->
  <polygon points="96,147 99,151 96,155 93,151"
           fill="url(#dotGrad)" opacity="0.82"/>
  <!-- Right side diamond ornament -->
  <polygon points="404,147 407,151 404,155 401,151"
           fill="url(#dotGrad)" opacity="0.82"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- TAGLINE: L'OR QUI T'EMBRASSE                  -->
  <!-- Ultra-light spaced caps, horizontal gold fade  -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Tagline glow layer -->
  <g filter="url(#taglineGlow)" opacity="0.52">
    <text
      x="250" y="153"
      text-anchor="middle"
      font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif"
      font-size="8.5"
      font-weight="200"
      letter-spacing="6"
      fill="url(#taglineGrad)"
      transform="translate(-15,0)">L'OR QUI T'EMBRASSE</text>
  </g>

  <!-- Main tagline -->
  <text
    x="250" y="153"
    text-anchor="middle"
    font-family="'Helvetica Neue', 'Helvetica', 'Arial', sans-serif"
    font-size="8.5"
    font-weight="200"
    letter-spacing="6"
    fill="url(#taglineGrad)"
    transform="translate(-15,0)">L'OR QUI T'EMBRASSE</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- OUTER BORDER RULE — very faint base line       -->
  <!-- ══════════════════════════════════════════════ -->

  <line x1="28" y1="165" x2="472" y2="165"
        stroke="url(#ruleGrad)" stroke-width="0.4" opacity="0.42"/>

</svg>
